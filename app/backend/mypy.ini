[mypy]
python_version = 3.11
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
show_error_codes = true
explicit_package_bases = true
exclude = (alembic|scripts|tests|venv|__pycache__|\.pytest_cache|test_api\.py)

# Web framework
[mypy-fastapi.*]
ignore_missing_imports = true

[mypy-starlette.*]
ignore_missing_imports = true

[mypy-uvicorn.*]
ignore_missing_imports = true

# Database/ORM
[mypy-sqlmodel.*]
ignore_missing_imports = true

[mypy-sqlalchemy.*]
ignore_missing_imports = true

[mypy-alembic.*]
ignore_missing_imports = true

[mypy-psycopg2.*]
ignore_missing_imports = true

# Auth
[mypy-jose.*]
ignore_missing_imports = true

[mypy-pydantic.*]
ignore_missing_imports = true

# ML libraries
[mypy-birdnet.*]
ignore_missing_imports = true

[mypy-torch.*]
ignore_missing_imports = true

[mypy-timm.*]
ignore_missing_imports = true

[mypy-PIL.*]
ignore_missing_imports = true

[mypy-PytorchWildlife]
ignore_missing_imports = true

[mypy-PytorchWildlife.*]
ignore_missing_imports = true

[mypy-numpy]
ignore_missing_imports = true

[mypy-numpy.*]
ignore_missing_imports = true

# Cloud/utilities
[mypy-boto3.*]
ignore_missing_imports = true

[mypy-botocore.*]
ignore_missing_imports = true

[mypy-rapidfuzz.*]
ignore_missing_imports = true

[mypy-openpyxl.*]
ignore_missing_imports = true

[mypy-docx.*]
ignore_missing_imports = true

# Error monitoring
[mypy-sentry_sdk.*]
ignore_missing_imports = true
