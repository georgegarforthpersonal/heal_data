name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/backend/requirements.txt

      - name: Install dependencies
        run: pip install mypy types-requests

      - name: Run mypy
        run: mypy app/backend --config-file app/backend/mypy.ini

  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: docker compose --profile test up --build --abort-on-container-exit --exit-code-from test
